[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle errors, pyflakes, isort
ignore = [
    "E501",   # line too long — handled by formatter
    "F401",   # unused imports — too noisy during active development
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F811"]   # allow redefined fixtures in tests
"tools/*" = ["F401"]   # quick scripts can have unused imports
